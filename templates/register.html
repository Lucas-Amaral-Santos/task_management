{% extends 'base.html' %}
{% block content %}
{% for message in get_flashed_messages() %}
        <div class="alert alert-info">{{ message }}</div>
    {% endfor %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Login</h2>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ request.form.name }}" required>
            </div>
            <div class="form-group">
                <label for="sector">Setor</label>
                <select class="form-control" id="sector" name="sector">
                    <option value="">-------</option>
                    {% for sector in dropdown_sectors %}
                        <option value="{{ sector.id }}">{{ sector.name }}</option>
                    {% endfor %}
                </select>
                
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" value="{{ request.form.username }}" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="form-group form-check">
                <input type="hidden" class="form-check-input" id="is_admin" name="is_admin" value="off">
                <input type="checkbox" class="form-check-input" id="is_admin" name="is_admin" value="on">
                <label class="form-check-label" for="is_admin">Admin</label>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
    </div>
</div>
    
{% endblock %}
